apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: openbao-acme-issuer
spec:
  acme:
    # point to OpenBao's ACME directory within the cluster
    server: http://openbao.openbao.svc:8200/v1/pki_int/acme/directory
    email: admin@energy.internal
    privateKeySecretRef:
      name: openbao-acme-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: energy-test-cert
  namespace: default
spec:
  secretName: energy-test-cert-tls
  issuerRef:
    name: openbao-acme-issuer
    kind: ClusterIssuer
  commonName: test.energy.internal
  dnsNames:
    - test.energy.internal
    - meter-1.energy.internal
