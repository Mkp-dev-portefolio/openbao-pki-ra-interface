apiVersion: apps/v1
kind: Deployment
metadata:
  name: testserver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testserver
  template:
    metadata:
      labels:
        app: testserver
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: testserver
  namespace: default
spec:
  selector:
    app: testserver
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: testserver-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "openbao-acme-issuer"
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: testserver.solar.energy.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: testserver
                port:
                  number: 80
  tls:
    - hosts:
        - testserver.solar.energy.internal
      secretName: testserver-tls-cert
